<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExxonController — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-logo .app-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.02em;
    }
    .login-logo .app-subtitle {
      font-size: 0.85rem;
      color: #8b949e;
      margin-top: 0.25rem;
    }
    .form-label { color: #c9d1d9; font-size: 0.875rem; }
    .form-control {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #58a6ff;
      color: #c9d1d9;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    .btn-login {
      background: #238636;
      border: none;
      color: #fff;
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #2ea043; }
    .alert-danger {
      background: rgba(218,54,51,0.15);
      border: 1px solid rgba(218,54,51,0.4);
      color: #f85149;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    .indicator {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #238636;
      margin-right: 6px;
      box-shadow: 0 0 6px #238636;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .shame-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .shame-backdrop.show { display: flex; }
    .shame-gif {
      width: min(720px, 67vw);
      border-radius: 10px;
      border: 2px solid #f85149;
      box-shadow: 0 0 40px rgba(248,81,73,0.4);
    }
    .shame-close {
      margin-top: 1.2rem;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.45rem 1.4rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .shame-close:hover { background: #30363d; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="app-title">
        <span class="indicator"></span>ExxonController
      </div>
      <div class="app-subtitle">Flow Controller Web Interface</div>
    </div>

    {% if error %}
    <div class="alert alert-danger mb-3">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label for="username" class="form-label">Display Name</label>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="e.g. Lab Operator" value="Operator" autocomplete="username">
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Enter password" autocomplete="current-password" autofocus>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <p class="text-center mt-3 mb-0" style="color:#484f58; font-size:0.75rem;">
      All users share a single set of credentials.
    </p>
  </div>

  <!-- Wrong-password shame popup -->
  <div class="shame-backdrop {% if error %}show{% endif %}" id="shameBackdrop" onclick="if(event.target===this)closeShame()">
    <img class="shame-gif" src="/static/img/output.gif" alt="">
    <button class="shame-close" onclick="closeShame()">Close</button>
  </div>
  <script>
    function closeShame() {
      document.getElementById('shameBackdrop').classList.remove('show');
    }
  </script>
</body>
</html>
